<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeafPage</title>

    <link rel="stylesheet" href= "{{ url_for('static', filename='style/style.css') }}">
</head>
<body>

    <header>
        <h1>LeafPage🌿</h1>
        <p>Have an account? Log In.</p>
    </header>

    <nav>
        <a href="#">Log In</a>
        <a href="#">Sign Up</a>
    </nav>

    <main>
        <h2>Welcome to LeafPage</h2>
        <p>Have an account? Log In.</p>
        <p>Don't have an account? Sign Up.</p>
    </main>

    <form action="/" method="POST" enctype="multipart/form-data">
    <label for="subir">Seleccioná una imagen de basura para clasificar:</label>
    <br>
    <input type="file" name="archivo_imagen" id="subir" accept="image/*" required>
    
    <button type="submit">Clasificar</button>
</form>

<hr>

{% if resultado %}
    <h2>Resultado: El objeto es {{ resultado }}</h2>
{% else %}
    <p>Subí una foto para ver qué tipo de residuo es.</p>
{% endif %}

    <footer>
        <p>2026 LeafPage🌿</p>
    </footer>

</body>
</html>
